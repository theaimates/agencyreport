let state = {

  activeDateRange: 0,
  platformFilter: 'all',
  reportClientFilter: null,
  sortColumn: null,
  sortDirection: 'default',

  dateDropdownOpen: false,
  // Live data — null = use mock data, object = use live data
  liveClients: null,
  liveClientData: null,
};

// Restore from localStorage
try {
  const saved = localStorage.getItem('reportflow_state');
  if (saved) {
    const s = JSON.parse(saved);
    state.activeClient = s.activeClient ?? 0;
    state.activeSection = s.activeSection ?? 'overview';
    state.activeDateRange = s.activeDateRange ?? 0;
    state.platformFilter = s.platformFilter ?? 'all';
    state.reportClientFilter = s.reportClientFilter ?? null;
  }
} catch(e) {}

function saveState() {
  try {
    localStorage.setItem('reportflow_state', JSON.stringify({
      activeClient: state.activeClient,
      activeSection: state.activeSection,
      activeDateRange: state.activeDateRange,
      platformFilter: state.platformFilter,
      reportClientFilter: state.reportClientFilter
    }));
  } catch(e) {}
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function fmt(n) {
  return '$' + (n >= 1000 ? n.toLocaleString('en-US') : n);
}

function fmtK(n) {
  return n >= 1000 ? '$' + (n/1000).toFixed(0) + 'k' : '$' + n;
}

function roasClass(r) {
  if (r >= 4) return 'roas-good';
  if (r >= 2.5) return 'roas-ok';
  return 'roas-low';
}

function platformLabel(p) {
  const labels = {meta:'Meta',google:'Google',email:'Email'};
  return labels[p] || p;
}

// Returns active clients list (live or mock)
function getActiveClients() {
  return state.liveClients || MOCK_CLIENTS;
}

// Returns current client data (live or mock)
function getClient() {
  if (state.liveClientData) return state.liveClientData;
  const clients = getActiveClients();
  return clients[Math.min(state.activeClient, clients.length - 1)];
}

// Returns full report history (live or mock)
function getReportsList() {
  // In live mode, this would come from a dedicated WF6 reports endpoint.
  // For now, always return the mock history.
  return MOCK_REPORTS;
}

// LOADING & ERROR UI
// ══════════════════════════════════════════

function showLoading() {
  $('#loadingOverlay').classList.add('visible');
}

function hideLoading() {
  $('#loadingOverlay').classList.remove('visible');
}

function showErrorToast(msg) {
  const toast = $('#errorToast');
  if (msg) toast.querySelector('strong').nextSibling.textContent = '\n' + msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 4000);
}

// ══════════════════════════════════════════
// LIVE DATA LOADING
// ══════════════════════════════════════════

async function loadDashboard() {
  const clients = getActiveClients();
  const clientId = clients[state.activeClient]?.id;
  const dateRangeId = DATE_RANGES[state.activeDateRange].id;

  if (!clientId) return;

  showLoading();
  const data = await ReportAPI.fetchDashboard(clientId, dateRangeId);
  hideLoading();

  if (data) {
    state.liveClientData = data;
    updateClientUI();
  } else {
    state.liveClientData = null;
    if (!CONFIG.isOfflineMode()) showErrorToast('Demo mode — connect n8n in Settings to load live data.');
  }

  renderDashboard();
}

}

        ${filtered.length === 0 ? `<div class="no-results">No reports found</div>` : `

            <th>Type</th>

                  <div style="display:flex;align-items:center;gap:8px">
                    <div style="width:24px;height:24px;border-radius:6px;background:${r.gradient};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0">${r.initials}</div>

                <td><span class="status-badge ${r.status}">${r.status === 'sent' ? '✓ Sent' : '⏳ Draft'}</span></td>

function bindSettingsEvents() {
  // Toggle password visibility
  $('#toggleSecret').addEventListener('click', () => {
    const input = $('#settingsSecret');
    const isPass = input.type === 'password';
    input.type = isPass ? 'text' : 'password';
    $('#eyeIcon').innerHTML = isPass
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  // Save
  $('#settingsSave').addEventListener('click', () => {
    const url = $('#settingsUrl').value.trim();
    const secret = $('#settingsSecret').value.trim();
    if (url) CONFIG.setN8nUrl(url);
    CONFIG.setWebhookSecret(secret);
    showConnStatus('ok', '✓ Saved — reconnecting…');
    state.liveClientData = null;
    loadDashboard();
  });

  // Test connection
  $('#settingsTest').addEventListener('click', async () => {
    const btn = $('#settingsTest');
    btn.textContent = 'Testing…';
    btn.disabled = true;
    showConnStatus(null, '');
    const url = $('#settingsUrl').value.trim();
    if (url) CONFIG.setN8nUrl(url);
    const clients = await ReportAPI.fetchClients();
    btn.textContent = 'Test Connection';
    btn.disabled = false;
    if (clients && clients.length) {
      showConnStatus('ok', `✓ Connected — ${clients.length} client${clients.length !== 1 ? 's' : ''} found`);
    } else {
      showConnStatus('fail', '✗ Could not reach n8n — check URL and that WF6 is active');
    }
  });

  // Reset to demo
  $('#settingsReset').addEventListener('click', () => {
    localStorage.removeItem('reportflow_n8n_url');
    localStorage.removeItem('reportflow_webhook_secret');
    state.liveClients = null;
    state.liveClientData = null;
    $('#settingsUrl').value = '';
    $('#settingsSecret').value = '';
    showConnStatus('ok', '✓ Reset — showing demo data');
    renderDashboard();
  });
}

function showConnStatus(type, msg) {
  const el = $('#connStatus');
  if (!el) return;
  if (!msg) { el.style.display = 'none'; return; }
  el.className = `conn-status${type ? ' ' + type : ''}`;
  el.textContent = msg;
  el.style.display = 'inline-flex';
}

// ══════════════════════════════════════════
// REVENUE CHART (SVG + interactive)
// ══════════════════════════════════════════

function renderRevenueChart(c) {
  const container = $('#revenueChart');
  const data = c.revenue;
  if (!data || !data.length) return;
  const maxVal = Math.max(...data.map(d => d.value)) * 1.15;
  const minVal = 0;
  const W = 700, H = 200, PL = 60, PR = 30, PT = 20, PB = 30;
  const chartW = W - PL - PR;
  const chartH = H - PT - PB;

  function xPos(i) { return PL + (i / (data.length - 1)) * chartW; }
  function yPos(v) { return PT + chartH - ((v - minVal) / (maxVal - minVal)) * chartH; }

  const gridLines = [0, 15000, 30000, 45000, 60000];
  let gridSvg = gridLines.map(v => {
    const y = yPos(v);
    return `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#1e2130" stroke-width="1"/>
            <text x="${PL-8}" y="${y+4}" text-anchor="end" fill="#504d48" font-family="DM Mono" font-size="10">${fmtK(v)}</text>`;
  }).join('');

  let linePath = data.map((d, i) => `${i===0?'M':'L'}${xPos(i)},${yPos(d.value)}`).join(' ');
  let areaPath = linePath + ` L${xPos(data.length-1)},${PT+chartH} L${xPos(0)},${PT+chartH} Z`;

  let points = data.map((d, i) => {
    const x = xPos(i), y = yPos(d.value);
    const change = d.prev ? ((d.value - d.prev) / d.prev * 100).toFixed(1) : 0;
    return `<circle cx="${x}" cy="${y}" r="4" fill="#08090c" stroke="#d4a843" stroke-width="2" class="chart-point" style="transition:all .15s"/>
            <circle cx="${x}" cy="${y}" r="20" fill="transparent" class="chart-dot-hover"
              data-week="${d.week}" data-value="${d.value}" data-prev="${d.prev}" data-change="${change}" data-x="${x}" data-y="${y}"/>`;
  }).join('');

  let xLabels = data.map((d, i) => {
    const x = xPos(i);
    const isLast = i === data.length - 1;
    return `<text x="${x}" y="${H-8}" text-anchor="middle" fill="${isLast?'#d4a843':'#504d48'}" font-family="DM Mono" font-size="10" ${isLast?'font-weight="500"':''}>${d.week}</text>`;
  }).join('');

  let crosshairV = `<line class="chart-crosshair" id="crosshairV" x1="0" y1="${PT}" x2="0" y2="${PT+chartH}"/>`;
  let crosshairH = `<line class="chart-crosshair" id="crosshairH" x1="${PL}" y1="0" x2="${W-PR}" y2="0"/>`;

  container.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" class="chart-svg">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#d4a843" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridSvg}
      <path d="${areaPath}" fill="url(#areaGrad)" opacity="0.8"/>
      <path d="${linePath}" fill="none" stroke="#d4a843" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${points}
      ${crosshairV}${crosshairH}
      ${xLabels}
    </svg>
    <div class="chart-tooltip" id="chartTooltip">
      <div class="tt-label" id="ttLabel"></div>
      <div class="tt-value" id="ttValue"></div>
      <div class="tt-change" id="ttChange"></div>
    </div>`;

  container.querySelectorAll('.chart-dot-hover').forEach(dot => {
    dot.addEventListener('mouseenter', () => {
      const rect = container.getBoundingClientRect();
      const svgRect = container.querySelector('svg').getBoundingClientRect();
      const scale = svgRect.width / W;
      const dotX = parseFloat(dot.dataset.x) * scale;
      const dotY = parseFloat(dot.dataset.y) * scale;
      const tt = $('#chartTooltip');
      const change = parseFloat(dot.dataset.change);
      $('#ttLabel').textContent = dot.dataset.week;
      $('#ttValue').textContent = fmt(parseInt(dot.dataset.value));
      $('#ttChange').textContent = `${change >= 0 ? '↑' : '↓'} ${Math.abs(change)}% vs prev`;
      $('#ttChange').className = `tt-change ${change >= 0 ? 'up' : 'down'}`;
      tt.style.left = Math.min(dotX - 50, rect.width - 160) + 'px';
      tt.style.top = (dotY - 80) + 'px';
      tt.classList.add('visible');
      const cv = $('#crosshairV'), ch = $('#crosshairH');
      cv.setAttribute('x1', dot.dataset.x); cv.setAttribute('x2', dot.dataset.x); cv.style.opacity = '1';
      ch.setAttribute('y1', dot.dataset.y); ch.setAttribute('y2', dot.dataset.y); ch.style.opacity = '1';
      dot.classList.add('active');
      dot.previousElementSibling.setAttribute('r', '6');
    });
    dot.addEventListener('mouseleave', () => {
      $('#chartTooltip').classList.remove('visible');
      $('#crosshairV').style.opacity = '0';
      $('#crosshairH').style.opacity = '0';
      dot.classList.remove('active');
      dot.previousElementSibling.setAttribute('r', '4');
    });
  });
}

// ══════════════════════════════════════════
// DONUT CHART (SVG + interactive)
// ══════════════════════════════════════════

function renderDonutChart(c) {
  const container = $('#donutChart');
  const channels = c.channels;
  if (!channels || !channels.length) return;
  const total = channels.reduce((s, ch) => s + ch.value, 0);
  const R = 54, CX = 75, CY = 75;
  const circumference = 2 * Math.PI * R;

  let offset = 0;
  let segments = channels.map((ch) => {
    const pct = ch.value / total;
    const dashLen = pct * circumference;
    const dashGap = circumference - dashLen;
    const seg = `<circle class="donut-segment" cx="${CX}" cy="${CY}" r="${R}"
      stroke="${ch.color}" stroke-dasharray="${dashLen} ${dashGap}"
      stroke-dashoffset="${-offset}" data-name="${ch.name}" data-value="${ch.value}" data-pct="${ch.pct}"/>`;
    offset += dashLen;
    return seg;
  }).join('');

  container.innerHTML = `
    <div class="donut-container" id="donutContainer">
      <svg class="donut-svg" viewBox="0 0 150 150">${segments}</svg>
      <div class="donut-center">
        <span class="donut-total">${fmtK(total)}</span>
        <span class="donut-label">Total</span>
      </div>
      <div class="donut-tooltip" id="donutTooltip"></div>
    </div>
    <div class="channel-legend">
      ${channels.map(ch => `
        <div class="legend-item" data-channel="${ch.name}">
          <div class="legend-dot" style="background:${ch.color}"></div>
          <div class="legend-info">
            <span class="legend-name">${ch.name}</span>
            <span class="legend-value">${fmt(ch.value)} · ${ch.pct}%</span>
          </div>
        </div>`).join('')}
    </div>`;

  container.querySelectorAll('.donut-segment').forEach(seg => {
    seg.addEventListener('mouseenter', () => {
      const tt = $('#donutTooltip');
      tt.innerHTML = `<strong>${seg.dataset.name}</strong><br>${fmt(parseInt(seg.dataset.value))} · ${seg.dataset.pct}%`;
      tt.classList.add('visible');
    });
    seg.addEventListener('mouseleave', () => {
      $('#donutTooltip').classList.remove('visible');
    });
  });

  container.querySelectorAll('.legend-item').forEach(item => {
    item.addEventListener('mouseenter', () => {
      const name = item.dataset.channel;
      container.querySelectorAll('.donut-segment').forEach(s => {
        s.style.opacity = s.dataset.name === name ? '1' : '0.25';
        if (s.dataset.name === name) s.style.strokeWidth = '34';
      });
    });
    item.addEventListener('mouseleave', () => {
      container.querySelectorAll('.donut-segment').forEach(s => {
        s.style.opacity = '1';
        s.style.strokeWidth = '28';
      });
    });
  });
}

// CAMPAIGN TABLE (sortable + searchable)
// ══════════════════════════════════════════

function renderCampaignTable(c) {
  let campaigns = [...(c.campaigns || [])];

  if (state.platformFilter && state.platformFilter !== 'all') {
    campaigns = campaigns.filter(camp => camp.platform === state.platformFilter);
  }

  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    campaigns = campaigns.filter(camp =>
      camp.name.toLowerCase().includes(q) || camp.platform.toLowerCase().includes(q) || camp.status.toLowerCase().includes(q)
    );
  }

  if (state.sortColumn) {
    campaigns.sort((a, b) => {
      let va = a[state.sortColumn], vb = b[state.sortColumn];
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      if (state.sortDirection === 'asc') return va > vb ? 1 : va < vb ? -1 : 0;
      return va < vb ? 1 : va > vb ? -1 : 0;
    });
  }

  const countEl = $('#campaignCount');
  if (countEl) countEl.textContent = `${campaigns.length} active`;

  const tableCard = $('#tableCard');

  if (campaigns.length === 0) {
    tableCard.innerHTML = `<div class="no-results">No campaigns match "${state.searchQuery}"</div>`;
    return;
  }

  const cols = [
    {key:'name',label:'Campaign'},
    {key:'platform',label:'Platform'},
    {key:'spend',label:'Spend'},
    {key:'revenue',label:'Revenue'},
    {key:'roas',label:'ROAS'},
    {key:'status',label:'Status'}
  ];

  function sortArrow(key) {
    if (state.sortColumn !== key) return '<span class="sort-arrow">↕</span>';
    return `<span class="sort-arrow">${state.sortDirection === 'asc' ? '↑' : '↓'}</span>`;
  }

  tableCard.innerHTML = `
    <table class="campaign-table">
      <thead><tr>
        ${cols.map(col => `<th data-col="${col.key}" class="${state.sortColumn===col.key?'sorted':''}">${col.label} ${sortArrow(col.key)}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${campaigns.map(camp => `
          <tr data-campaign="${camp.name}">
            <td class="campaign-name">${camp.name}</td>
            <td><span class="platform-tag ${camp.platform}"><span class="dot"></span>${platformLabel(camp.platform)}</span></td>
            <td>${fmt(camp.spend)}</td>
            <td>${fmt(camp.revenue)}</td>
            <td class="${roasClass(camp.roas)}">${camp.roas}x</td>
            <td><span class="status-badge ${camp.status}">${camp.status.charAt(0).toUpperCase()+camp.status.slice(1)}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>`;

  tableCard.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (state.sortColumn === col) {
        state.sortDirection = state.sortDirection === 'asc' ? 'desc' : state.sortDirection === 'desc' ? 'default' : 'asc';
        if (state.sortDirection === 'default') state.sortColumn = null;
      } else {
        state.sortColumn = col;
        state.sortDirection = 'asc';
      }
      renderCampaignTable(getClient());
    });
  });

  tableCard.querySelectorAll('tr[data-campaign]').forEach(tr => {
    tr.addEventListener('click', () => {
      const name = tr.dataset.campaign;
      const campaign = getClient().campaigns.find(camp => camp.name === name);
      if (campaign) openModal(campaign);
    });
  });
}

// COUNTER ANIMATION
// ══════════════════════════════════════════

function animateCounters() {
  document.querySelectorAll('[data-count]').forEach(el => {
    const target = parseFloat(el.dataset.count);
    const prefix = el.dataset.prefix || '';
    const suffix = el.dataset.suffix || '';
    const decimals = parseInt(el.dataset.decimals) || 0;
    const duration = 1200;
    const start = performance.now();

    function tick(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = target * eased;
      if (decimals > 0) {
        el.textContent = prefix + current.toFixed(decimals) + suffix;
      } else {
        el.textContent = prefix + Math.round(current).toLocaleString('en-US') + suffix;
      }
      if (progress < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

    opt.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(opt.dataset.index);
      if (idx !== state.activeClient) {
        state.activeClient = idx;
        state.sortColumn = null;
        state.sortDirection = 'default';
        state.searchQuery = '';
        state.liveClientData = null;
        updateClientUI();
        saveState();
        loadDashboard(); // fetch live data for new client
      }
      toggleClientDropdown(false);
    });
  });
}

function updateClientUI() {
  const c = getClient();
  $('#clientAvatar').textContent = c.initials;
  $('#clientAvatar').style.background = c.gradient;
  $('#clientName').textContent = c.name;
  $('#clientMeta').textContent = `${c.niche} · ${c.activeCampaigns} campaigns active`;
}

function toggleClientDropdown(force) {
  state.clientDropdownOpen = force !== undefined ? force : !state.clientDropdownOpen;
  $('#clientSelector').classList.toggle('open', state.clientDropdownOpen);
  if (state.clientDropdownOpen) {
    state.dateDropdownOpen = false;
    $('#dateDropdown').classList.remove('open');
  }
}

// ══════════════════════════════════════════
// DATE RANGE
// ══════════════════════════════════════════

function renderDateDropdown() {
  const dd = $('#dateDropdown');
  dd.innerHTML = DATE_RANGES.map((d, i) => `
    <div class="date-option ${i===state.activeDateRange?'selected':''}" data-index="${i}">${d.label}</div>`).join('');

  dd.querySelectorAll('.date-option').forEach(opt => {
    opt.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(opt.dataset.index);
      state.activeDateRange = idx;
      state.liveClientData = null;
      $('#dateLabel').textContent = DATE_RANGES[idx].value;
      dd.querySelectorAll('.date-option').forEach((o, oi) => o.classList.toggle('selected', oi === idx));
      toggleDateDropdown(false);
      saveState();
      loadDashboard(); // fetch live data for new date range
    });
  });
}

function toggleDateDropdown(force) {
  state.dateDropdownOpen = force !== undefined ? force : !state.dateDropdownOpen;
  $('#dateDropdown').classList.toggle('open', state.dateDropdownOpen);
  if (state.dateDropdownOpen) {
    state.clientDropdownOpen = false;
    $('#clientSelector').classList.remove('open');
  }
}

// ══════════════════════════════════════════
// EVENT BINDINGS
// ══════════════════════════════════════════

function bindEvents() {
  const searchInput = $('#searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      renderCampaignTable(getClient());
    });
  }
}

function bindGlobalEvents() {
  $('#clientSelector').addEventListener('click', (e) => {
    if (e.target.closest('.client-dropdown')) return;
    toggleClientDropdown();
  });

  $('#dateBadge').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleDateDropdown();
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#clientSelector')) toggleClientDropdown(false);
    if (!e.target.closest('#dateBadge') && !e.target.closest('#dateDropdown')) toggleDateDropdown(false);
  });

  $('#modalClose').addEventListener('click', closeModal);
  $('#modalOverlay').addEventListener('click', (e) => {
    if (e.target === $('#modalOverlay')) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  $('#exportBtn').addEventListener('click', () => {
    window.print();
  });

  $$('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const section = item.dataset.section;
      if (section) {
        state.activeSection = section;
        $$('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        renderDashboard();
        saveState();
        // Close mobile sidebar after navigation
        if (window.innerWidth <= 768) {
          $('#sidebar').classList.remove('open');
        }
      }
    });
  });

  $('#mobileToggle').addEventListener('click', () => {
    $('#sidebar').classList.toggle('open');
  });
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════

async function init() {
  updateClientUI();
  renderClientDropdown();
  renderDateDropdown();
  $('#dateLabel').textContent = DATE_RANGES[state.activeDateRange].value;

  $$('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.section === state.activeSection);
  });

  bindGlobalEvents();

  // Render mock data immediately (zero delay, works offline)
  renderDashboard();

  // Then try to fetch live data in the background
  const liveClients = await ReportAPI.fetchClients();
  if (liveClients && liveClients.length) {
    state.liveClients = liveClients;
    // Keep activeClient index in bounds
    if (state.activeClient >= liveClients.length) state.activeClient = 0;
    renderClientDropdown();
    updateClientUI();
  }

  // Load live dashboard data (will fall back to mock silently if n8n unreachable)
  await loadDashboard();
}

init();
</script>
</body>
</html>
